    <nav class="hidden md:flex items-center space-x-6 text-sm font-medium text-slate-600">
      <a href="#" class="hover:text-cyan-600 transition">Как покупать</a>
      <a href="#" class="hover:text-cyan-600 transition">Распродажи</a>
      <a href="#" class="hover:text-cyan-600 transition">Цены</a>
      <a href="#" class="hover:text-cyan-600 transition">Помощь</a>

      <a href="#" class="hover:text-cyan-600 transition">Магазины</a>

        <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">

    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 my-4">
    <div class="relative overflow-hidden rounded-3xl bg-gradient-to-br from-[#4176df] via-[#5295e7] to-[#5ec9e9] text-white px-8 py-12 md:px-16 md:py-20 flex flex-col md:flex-row items-center justify-between min-h-[500px]">
      <div class="max-w-xl space-y-6 z-10 text-center md:text-left">
        <h1 class="text-3xl sm:text-4xl md:text-5xl font-extrabold tracking-tight leading-tight">
          Доставка товаров <br class="hidden sm:inline"> из Великобритании <br> в Россию
        </h1>
        <p class="text-white/80 text-sm sm:text-base leading-relaxed max-w-lg">

        <div class="pt-2">
          <button class="bg-[#22C55E] text-white font-semibold px-8 py-4 rounded-full shadow-lg">

          </button>
        </div>
      </div>

      <div class="relative w-full max-w-[400px] md:max-w-[450px] aspect-square mt-10 md:mt-0 flex items-center justify-center">
